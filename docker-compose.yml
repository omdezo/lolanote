# QomraNote — full local stack: MongoDB, Keycloak (+Postgres), Go API, web.
# `make up` (or `docker compose up -d --build`) brings everything online:
#   web       http://localhost:3000   (demo / demo1234)
#   api       http://localhost:8080
#   keycloak  http://localhost:8081   (admin / admin — dev only)
#   mongo     localhost:27017

services:
  mongo:
    image: mongo:7
    container_name: qomranote-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak-db:
    image: postgres:16-alpine
    container_name: qomranote-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: qomranote-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: http://localhost:8081
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      # The KC image ships no curl; poke the management health port over TCP.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  api:
    build:
      context: ./backend
    container_name: qomranote-api
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: ":8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-qomranote}
      # Split horizon: tokens carry the browser-facing issuer; discovery goes
      # over the docker network.
      KEYCLOAK_ISSUER: http://localhost:8081/realms/qomranote
      KEYCLOAK_INTERNAL_BASE: http://keycloak:8080
      KEYCLOAK_REALM: qomranote
      KEYCLOAK_ADMIN_CLIENT_ID: qomranote-api
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-qomranote-api-secret-change-me}
      KEYCLOAK_WEB_CLIENT_ID: qomranote-web
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      LOCAL_STORAGE_DIR: /app/data/uploads
      PUBLIC_API_BASE: ${PUBLIC_API_BASE:-http://localhost:8080}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-qomranote}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - api-uploads:/app/data/uploads
    depends_on:
      mongo:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./frontend
      args:
        VITE_KEYCLOAK_URL: http://localhost:8081
        VITE_KEYCLOAK_REALM: qomranote
        VITE_KEYCLOAK_CLIENT_ID: qomranote-web
    container_name: qomranote-web
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  mongo-data:
  keycloak-db-data:
  api-uploads:
