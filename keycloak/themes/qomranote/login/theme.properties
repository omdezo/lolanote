# QomraNote login theme — extends the unstyled `base` markup (stable IDs and
# kc*Class hooks) and applies the app's design system. Dark mode follows the
# OS via prefers-color-scheme in qomranote.css.
parent=base
import=common/keycloak

styles=css/qomranote.css

kcHtmlClass=qn-html
kcBodyClass=qn-body
kcLoginClass=qn-login
kcHeaderClass=qn-header
kcHeaderWrapperClass=qn-header-wrap
kcFormCardClass=qn-card
kcContentWrapperClass=qn-content
kcFormGroupClass=qn-group
kcLabelClass=qn-label
kcLabelWrapperClass=qn-label-wrap
kcInputClass=qn-input
kcInputWrapperClass=qn-input-wrap
kcInputGroup=qn-input-group
kcInputErrorMessageClass=qn-input-error
kcFormOptionsClass=qn-options
kcFormOptionsWrapperClass=qn-options-wrap
kcFormButtonsClass=qn-buttons
kcButtonClass=qn-btn
kcButtonPrimaryClass=qn-btn-primary
kcButtonDefaultClass=qn-btn-default
kcButtonLargeClass=qn-btn-lg
kcButtonBlockClass=qn-btn-block
kcSignUpClass=qn-signup
kcInfoAreaWrapperClass=qn-info
kcAlertClass=qn-alert
kcAlertTitleClass=qn-alert-title
kcFeedbackErrorIcon=
kcFeedbackWarningIcon=
kcFeedbackSuccessIcon=
kcFeedbackInfoIcon=
kcResetFlowIcon=
kcCheckboxInputClass=qn-checkbox
